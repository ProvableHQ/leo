#      - build-and-test
#      - codecov/upload:
#            file: { { coverage_report_filepath } }
#      - save_cache:
#          key: codecov-cargo-v1-{{ arch }}-{{ checksum "Cargo.toml" }}-{{ checksum "Cargo.lock" }}
#          paths:
#            - ~/.cargo
#            - ~/.aleo/resources

  code-style:
    docker:
      - image: "cimg/rust:1.96.0-node"  # Rust image with Node.js for tree-sitter CLI checks.
    resource_class: small
    steps:
      - only-run-if:
          scope-is: "full"
      - checkout
      - install_rust_nightly
      - run:
          name: Update Submodules
          command: git submodule update --init --recursive
      - run:
          name: Check style
          command: cargo +nightly fmt --all -- --check
      - restore_cache:
          keys:
            - npx-treesitter-v1-0.25.10
      - run:
          name: Validate tree-sitter corpus
          command: |
            cd tree-sitter
            npx --yes tree-sitter-cli@0.25.10 test
      - save_cache:
          key: npx-treesitter-v1-0.25.10
          paths:
            - ~/.npm

  clippy:
    docker:
      - image: "cimg/rust:1.96.0"
    resource_class: large
    steps:
      - only-run-if:
          scope-is: "full"
      - checkout
      - restore_cache:
          keys:
            - cargo-v3-clippy-{{ arch }}-{{ .Branch }}-{{ checksum "Cargo.lock" }}-
            - cargo-v3-clippy-{{ arch }}-{{ .Branch }}-
            - cargo-v3-clippy-{{ arch }}-master-{{ checksum "Cargo.lock" }}-
            - cargo-v3-clippy-{{ arch }}-master-
      - install-libclang
      - run:
          name: Update Submodules
          command: git submodule update --init --recursive
      - run:
          name: Clippy
          no_output_timeout: 35m
          command: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - save_cache:
          key: cargo-v3-clippy-{{ arch }}-{{ .Branch }}-{{ checksum "Cargo.lock" }}-{{ .Revision }}
          paths:
            - ~/.cargo
            - ~/.cache/mtimes
            - target

  fmt-validate:
    docker:
      - image: "cimg/rust:1.96.0"
    resource_class: large
    steps:
      - only-run-if:
          scope-is: "full"
      - checkout
      - restore_cache:
          keys:
            - cargo-v3-fmt-validate-{{ arch }}-{{ .Branch }}-{{ checksum "Cargo.lock" }}-
            - cargo-v3-fmt-validate-{{ arch }}-{{ .Branch }}-
            - cargo-v3-fmt-validate-{{ arch }}-master-{{ checksum "Cargo.lock" }}-
            - cargo-v3-fmt-validate-{{ arch }}-master-
      - install-libclang
      - restore_cache:
          keys:
            - cargo-nextest-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
      - run:
          name: Install cargo-nextest
          command: |
            set -euo pipefail
            if command -v cargo-nextest >/dev/null 2>&1; then
              cargo nextest --version
            else
              cargo install cargo-nextest --locked
            fi
      - save_cache:
          key: cargo-nextest-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/bin
            - ~/.cargo/registry
            - ~/.cargo/git
      - run:
          name: Update Submodules
          command: git submodule update --init --recursive
      - run:
          name: Validate Leo formatter semantics
          no_output_timeout: 35m
          command: |
            cargo nextest run -p leo-fmt --locked --cargo-profile ci --features validate \
              -E 'test(/validate_/) - test(validate_ast_equivalence_repos)'
      - save_cache:
          key: cargo-v3-fmt-validate-{{ arch }}-{{ .Branch }}-{{ checksum "Cargo.lock" }}-{{ .Revision }}
          paths:
            - ~/.cargo
            - ~/.cache/mtimes
            - target

  cargo-doc:
    docker:
      - image: "cimg/rust:1.96.0"
    resource_class: large
    steps:
      - only-run-if:
          scope-is: "full"
      - checkout
      - restore_cache:
          keys:
            - cargo-v3-cargo-doc-{{ arch }}-{{ .Branch }}-{{ checksum "Cargo.lock" }}-
            - cargo-v3-cargo-doc-{{ arch }}-{{ .Branch }}-
            - cargo-v3-cargo-doc-{{ arch }}-master-{{ checksum "Cargo.lock" }}-
            - cargo-v3-cargo-doc-{{ arch }}-master-
      - install-libclang
      - run:
          name: Update Submodules
          command: git submodule update --init --recursive
      - run:
          name: Build Cargo Docs
          command: |
            cargo doc --no-deps --document-private-items --workspace
            rm -rf ./tests
          environment:
            RUSTDOCFLAGS: "--enable-index-page -Zunstable-options"
            RUSTC_BOOTSTRAP: "1"
      - save_cache:
          key: cargo-v3-cargo-doc-{{ arch }}-{{ .Branch }}-{{ checksum "Cargo.lock" }}-{{ .Revision }}
          paths:
            - ~/.cargo
            - ~/.cache/mtimes
            - target

  docs-lint:
    docker:
      # Need Node 22.12+ or 24.x so `require(esm)` is unflagged — older patches
      # choke on the marked v17 ESM module imported by markdown-link-check's
      # transitive deps.
      - image: "cimg/node:24.0"
    resource_class: small
    steps:
      - checkout
      - restore_cache:
          keys:
            - npx-docs-v1-mdlint-0.47.0-mlc-3.14.2
      - run:
          name: markdownlint
          command: npx --yes markdownlint-cli@0.47.0 --config .markdownlint.yaml 'documentation/**/*.md'
      - run:
          name: Check documentation links
          no_output_timeout: 10m
          command: |
            rc=0
            while IFS= read -r -d '' f; do
              npx --yes markdown-link-check@3.14.2 --config .mlc_config.json --quiet "$f" || rc=1
            done < <(find documentation -name '*.md' -print0)
            exit $rc
      - save_cache:
          key: npx-docs-v1-mdlint-0.47.0-mlc-3.14.2
          paths:
            - ~/.npm

  leo-executable:
    executor: linux-executor
    resource_class: xlarge
    steps:
      - only-run-if:
          scope-is: "full snippets"
      - checkout
      - restore_cache:
          keys:
            - cargo-v3-leo-exec-{{ arch }}-{{ .Branch }}-{{ checksum "Cargo.lock" }}-
            - cargo-v3-leo-exec-{{ arch }}-{{ .Branch }}-
            - cargo-v3-leo-exec-{{ arch }}-master-{{ checksum "Cargo.lock" }}-
            - cargo-v3-leo-exec-{{ arch }}-master-
      - install-libclang
      - run:
          name: Update Submodules
          command: git submodule update --init --recursive
      - run:
          name: Build and install Leo
          no_output_timeout: 30m
          command: cargo install --path crates/leo --root . --locked
      - persist_to_workspace:
          root: ~/
          paths:
            - project/bin
            - project/.circleci
            - project/examples
            - project/documentation
      - save_cache:
          key: cargo-v3-leo-exec-{{ arch }}-{{ .Branch }}-{{ checksum "Cargo.lock" }}-{{ .Revision }}
          paths:
            - ~/.cargo
            - ~/.cache/mtimes
            - target

  leo-new:
    docker:
      - image: cimg/rust:1.96.0
    resource_class: small
    steps:
      - only-run-if:
          scope-is: "full"
      - attach_workspace:
          at: /home/circleci/project/
      - run:
          name: leo new
          command: |
            export LEO=/home/circleci/project/project/bin/leo
            timeout 30m ./project/.circleci/leo-new.sh

  leo-clean:
    docker:
      - image: cimg/rust:1.96.0
    resource_class: small
    steps:
      - only-run-if:
          scope-is: "full"
      - attach_workspace:
          at: /home/circleci/project/
      - run:
          name: leo clean
          command: |
            export LEO=/home/circleci/project/project/bin/leo
            ./project/.circleci/leo-clean.sh

  test-examples:
    docker:
      - image: cimg/rust:1.96.0
    resource_class: large
    steps:
      - only-run-if:
          scope-is: "full"
      - attach_workspace:
          at: /home/circleci/project/
      - run:
          name: test examples example
          command: |
            export LEO=/home/circleci/project/project/bin/leo
            export EXAMPLES=/home/circleci/project/project/examples
            ./project/.circleci/test-examples.sh

  build-doc-code-snippets:
    docker:
      - image: cimg/rust:1.96.0
    resource_class: medium
    steps:
      - only-run-if:
          scope-is: "full snippets"
      - attach_workspace:
          at: /home/circleci/project/
      - run:
          name: leo build on every documentation example
          command: |
            export LEO=/home/circleci/project/project/bin/leo
            # `leo build` resolves dependencies through ~/.aleo and errors out
            # if the directory is missing on a fresh CI image.
            mkdir -p "$HOME/.aleo"
            cd /home/circleci/project/project
            failed=0
            # Walk every directory that has a top-level program.json (skipping
            # generated build/ and imports/ subdirs that contain their own copies).
            # If a snippet has a `tests/` subdirectory, run `leo test` (which
            # builds the program, builds the tests, and executes them against
            # the local VM). Otherwise run `leo build` for fast compile-only
            # verification.
            while IFS= read -r d; do
              echo "--- $d ---"
              if [ -d "$d/tests" ]; then
                (cd "$d" && "$LEO" --disable-update-check test) || failed=1
              else
                (cd "$d" && "$LEO" --disable-update-check build) || failed=1
              fi
            done < <(find documentation/code_snippets -name program.json -not -path '*/build/*' -not -path '*/imports/*' | xargs -n1 dirname | sort)
            exit $failed

# Workflows always run so required GitHub checks report; jobs halt per scope
# (see `only-run-if`).
workflows:
  test-windows:
    jobs:
      - test-windows

  test-macos:
    jobs:
      - test-macos

  test-linux:
    jobs:
      - test-linux

  code-quality:
    jobs:
      - code-style
      - clippy
      - fmt-validate
      - cargo-doc
      - docs-lint

  leo-executable:
    jobs:
      - leo-executable
      - leo-new:
          requires:
            - leo-executable
      - leo-clean:
          requires:
            - leo-executable
      - test-examples:
          requires:
            - leo-executable
      - build-doc-code-snippets:
          requires:
            - leo-executable
