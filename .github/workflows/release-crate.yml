name: Release Crate

on:
  push:
    tags: ['*-v[0-9]*']

env:
  RUST_BACKTRACE: 0

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      bin-name: ${{ steps.parse.outputs.bin-name }}
      version: ${{ steps.parse.outputs.version }}
      crate-name: ${{ steps.find.outputs.crate-name }}
      crate-dir: ${{ steps.find.outputs.crate-dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse Tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Split on last occurrence of "-v" followed by a digit.
          BIN_NAME="${TAG%-v[0-9]*}"
          VERSION="${TAG#"$BIN_NAME"-v}"
          if [ -z "$BIN_NAME" ] || [ -z "$VERSION" ]; then
            echo "::error::Failed to parse tag '$TAG'"
            exit 1
          fi
          echo "bin-name=$BIN_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Parsed tag: bin=$BIN_NAME version=$VERSION"

      - name: Find Crate
        id: find
        run: |
          BIN_NAME="${{ steps.parse.outputs.bin-name }}"
          VERSION="${{ steps.parse.outputs.version }}"

          # Search for a crate whose [[bin]] section declares a matching name.
          # Uses -A5 to tolerate comments or blank lines between [[bin]] and name.
          FOUND=""
          for toml in crates/*/Cargo.toml; do
            if grep -A5 '^\[\[bin\]\]' "$toml" | grep -q "^name = \"$BIN_NAME\""; then
              FOUND="$toml"
              break
            fi
          done

          if [ -z "$FOUND" ]; then
            echo "::error::No crate found with binary name '$BIN_NAME'"
            exit 1
          fi

          CRATE_DIR="$(dirname "$FOUND")"
          CRATE_NAME="$(grep '^name' "$FOUND" | head -1 | sed 's/.*= *"\(.*\)"/\1/')"
          TOML_VERSION="$(grep '^version' "$FOUND" | head -1 | sed 's/.*= *"\(.*\)"/\1/')"

          if [ "$TOML_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match $FOUND version ($TOML_VERSION)"
            exit 1
          fi

          echo "crate-name=$CRATE_NAME" >> "$GITHUB_OUTPUT"
          echo "crate-dir=$CRATE_DIR" >> "$GITHUB_OUTPUT"
          echo "Found crate: name=$CRATE_NAME dir=$CRATE_DIR"

  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-14-large
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Add Target
        if: matrix.target == 'aarch64-apple-darwin'
        run: rustup target add ${{ matrix.target }}

      - name: Verify Cargo.lock
        shell: bash
        run: test -f Cargo.lock || (echo "::error::Cargo.lock missing" && exit 1)

      - name: Determine Build Flags
        id: flags
        shell: bash
        run: |
          FEATURES=""
          TARGET_FLAG=""
          if [ "${{ needs.prepare.outputs.crate-name }}" = "leo-lang" ]; then
            FEATURES="--features noconfig"
          fi
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            TARGET_FLAG="--target aarch64-apple-darwin"
          elif [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            TARGET_FLAG="--target x86_64-unknown-linux-musl"
          fi
          echo "features=$FEATURES" >> "$GITHUB_OUTPUT"
          echo "target-flag=$TARGET_FLAG" >> "$GITHUB_OUTPUT"

      # Standard build (linux-gnu, macos, windows)
      - name: Build
        if: matrix.target != 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          cargo build \
            --package ${{ needs.prepare.outputs.crate-name }} \
            --release --locked \
            ${{ steps.flags.outputs.features }} \
            ${{ steps.flags.outputs.target-flag }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

      # Musl build via Docker
      - name: Build (musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          docker run \
            -v ${{ github.workspace }}:/home/rust/src \
            --rm \
            -t docker.io/blackdex/rust-musl:x86_64-musl-stable \
            bash -lc "
              rustup target add x86_64-unknown-linux-musl &&
              cd /home/rust/src &&
              cargo build \
                --package ${{ needs.prepare.outputs.crate-name }} \
                --target x86_64-unknown-linux-musl \
                --release --locked \
                ${{ steps.flags.outputs.features }}
            "

      - name: Determine Binary Path
        id: bin-path
        shell: bash
        run: |
          BIN="${{ needs.prepare.outputs.bin-name }}"
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)
              echo "path=target/release/${BIN}.exe" >> "$GITHUB_OUTPUT"
              ;;
            aarch64-apple-darwin)
              echo "path=target/aarch64-apple-darwin/release/${BIN}" >> "$GITHUB_OUTPUT"
              ;;
            x86_64-unknown-linux-musl)
              echo "path=target/x86_64-unknown-linux-musl/release/${BIN}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "path=target/release/${BIN}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Strip Binary
        if: runner.os != 'Windows'
        run: strip ${{ steps.bin-path.outputs.path }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="${{ needs.prepare.outputs.bin-name }}-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}.zip"
          zip -j "$ARCHIVE" ${{ steps.bin-path.outputs.path }}
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "${{ needs.prepare.outputs.bin-name }}-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}.zip"
          Compress-Archive "${{ steps.bin-path.outputs.path }}" $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ needs.prepare.outputs.bin-name }} v${{ needs.prepare.outputs.version }}"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
