[build-dependencies.walkdir]
workspace = true

[target."cfg(unix)".dependencies]
libc = "0.2"

  [target."cfg(unix)".dependencies.nix]
  version = "0.30"
  features = [ "process", "term", "fs", "poll" ]

  [target."cfg(unix)".dependencies.signal-hook]
  version = "0.4"
  features = [ "iterator" ]

[target."cfg(windows)".dependencies]
winapi = "0.3"
ansi_term = "0.12"

  [target."cfg(windows)".dependencies.windows-sys]
  version = "0.61"
  features = [
  "Win32_Foundation",
  "Win32_System_Threading",
  "Win32_System_JobObjects"
]

[profile.release]
opt-level = 3
lto = "thin"
incremental = true

[profile.bench]
opt-level = 3
debug = false
rpath = false
lto = "thin"
incremental = true
debug-assertions = false

[profile.dev]
opt-level = 2
lto = "off"
incremental = true
debug-assertions = false

[profile.test]
opt-level = 2
lto = "off"
incremental = true
debug = true
debug-assertions = true

[profile.ci]
inherits = "test"
opt-level = 1
lto = "off"
incremental = false
debug = false
debug-assertions = false
codegen-units = 32
