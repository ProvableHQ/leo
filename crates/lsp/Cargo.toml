[package]
name = "leo-lsp"
version = "4.0.2"
authors = [ "The Leo Team <leo@provable.com>" ]
description = "Language Server Protocol implementation for Leo"
homepage = "https://leo-lang.org"
repository = "https://github.com/ProvableHQ/leo"
keywords = [ "lsp", "language-server", "leo", "aleo" ]
categories = [ "development-tools", "text-editors" ]
include = [ "Cargo.toml", "src", "tests", "README.md", "LICENSE.md" ]
license = "GPL-3.0"
edition = "2024"

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/{ name }-v{ version }/{ name }-v{ version }-{ target }.zip"
bin-dir = "{ bin }{ binary-ext }"
pkg-fmt = "zip"

[lib]
path = "src/lib.rs"

[[bin]]
name = "leo-lsp"
path = "src/main.rs"

[dependencies]
anyhow             = { workspace = true }
crossbeam-channel  = { workspace = true }
leo-package        = { workspace = true }
leo-parser-rowan   = { workspace = true }
line-index         = { workspace = true }
lsp-server         = { workspace = true }
lsp-types          = { workspace = true }
serde_json         = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tempfile   = { workspace = true }
