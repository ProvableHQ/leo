[package]
name = "leo-span"
version = "4.0.1"
authors = [ "The Leo Team <leo@provable.com>" ]
description = "Span handling for the Leo programming language"
homepage = "https://leo-lang.org"
repository = "https://github.com/ProvableHQ/leo"
keywords = [
  "aleo",
  "cryptography",
  "leo",
  "programming-language",
  "zero-knowledge"
]
categories = [ "compilers", "cryptography", "web-programming" ]
include = [ "Cargo.toml", "src", "README.md", "LICENSE.md", "build.rs", "symbols.txt" ]
license = "GPL-3.0"
edition = "2024"

[dependencies]
# third party dependencies
fxhash       = { workspace = true }
indexmap     = { workspace = true }
scoped-tls   = { workspace = true }
serde        = { workspace = true }
